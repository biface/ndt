name: Python CI - Publish TestPyPI

on:
  workflow_run:
    workflows: ["Python CI - Build"]
    types:
      - completed

jobs:
  publish-testpypi:
    name: Publish release candidate to TestPyPI
    runs-on: ubuntu-latest
    # Run only if build succeeded and the tag is a release candidate (contains 'rc')
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      contains(github.event.workflow_run.head_branch, 'rc')

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.workflow_run.head_sha }}

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Extract version from tag
      id: version
      run: |
        TAG="${{ github.event.workflow_run.head_branch }}"
        VERSION="${TAG#v}"
        echo "tag=$TAG" >> $GITHUB_OUTPUT
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Tag: $TAG — Version: $VERSION"

    - name: Check if version exists on TestPyPI
      id: check
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        PACKAGE=$(python -c "import tomli; print(tomli.load(open('pyproject.toml','rb'))['project']['name'])")
        pip install tomli

        echo "package=$PACKAGE" >> $GITHUB_OUTPUT

        if curl -sf "https://test.pypi.org/pypi/$PACKAGE/$VERSION/json" > /dev/null; then
          echo "exists=true" >> $GITHUB_OUTPUT
          echo "✅ $PACKAGE==$VERSION already on TestPyPI — skipping"
        else
          echo "exists=false" >> $GITHUB_OUTPUT
          echo "📦 $PACKAGE==$VERSION not on TestPyPI — will publish"
        fi

    - name: Download build artifacts
      if: steps.check.outputs.exists == 'false'
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
        run-id: ${{ github.event.workflow_run.id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Publish to TestPyPI
      if: steps.check.outputs.exists == 'false'
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/
        password: ${{ secrets.TEST_PYPI_API_TOKEN }}
        skip-existing: true

    - name: Verify TestPyPI availability
      if: steps.check.outputs.exists == 'false'
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        PACKAGE="${{ steps.check.outputs.package }}"
        MAX=20
        for i in $(seq 1 $MAX); do
          echo "Attempt $i/$MAX..."
          if curl -sf "https://test.pypi.org/pypi/$PACKAGE/$VERSION/json" > /dev/null; then
            echo "✅ $PACKAGE==$VERSION available on TestPyPI"
            exit 0
          fi
          sleep 15
        done
        echo "::error::Package did not become available after $MAX attempts"
        exit 1

    - name: Get release draft
      id: draft
      if: steps.check.outputs.exists == 'false'
      run: |
        DRAFT=$(gh api repos/${{ github.repository }}/releases \
          --jq '[.[] | select(.draft == true)] | first')
        NAME=$(echo "$DRAFT" | jq -r '.name // ""')
        BODY=$(echo "$DRAFT" | jq -r '.body // ""')
        echo "name=$NAME" >> $GITHUB_OUTPUT
        echo "body<<EOF" >> $GITHUB_OUTPUT
        echo "$BODY" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create GitHub pre-release
      if: steps.check.outputs.exists == 'false'
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: ${{ steps.draft.outputs.name }}
        prerelease: true
        files: dist/*
        body: |
          ${{ steps.draft.outputs.body }}

          ---

          📦 **Published to TestPyPI**

          ```bash
          pip install --index-url https://test.pypi.org/simple/ \
                      --extra-index-url https://pypi.org/simple/ \
                      ${{ steps.check.outputs.package }}==${{ steps.version.outputs.version }}
          ```

          If validation passes, create tag `v${{ steps.version.outputs.version }}` (without `rc`) to publish to PyPI.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
