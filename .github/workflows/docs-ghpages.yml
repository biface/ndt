name: Deploy docs to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  deploy-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required by sphinx-multiversion to access all tags

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install documentation dependencies
        run: pip install -r docs/source/requirements.txt

      - name: Install package (editable)
        run: pip install -e .

      - name: Build docs with sphinx-multiversion
        run: sphinx-multiversion docs/source docs/build/html

      - name: Add redirect from root to master
        run: |
          cat > docs/build/html/index.html << 'HTML'
          <!DOCTYPE html>
          <html>
            <head>
              <meta http-equiv="refresh" content="0; url=master/" />
            </head>
            <body>
              <p>Redirecting to <a href="master/">master</a>…</p>
            </body>
          </html>
          HTML

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/build/html
          publish_branch: gh-pages
