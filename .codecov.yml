# .codecov.yml — ndict-tools
# https://docs.codecov.com/docs/codecovyml-reference

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: 80%
        threshold: 1%
        branches:
          - master
          - "staging/*"
    patch:
      default:
        target: 80%

comment:
  layout: "reach,diff,flags,components"
  behavior: default
  require_changes: false

component_management:
  default_rules:
    statuses:
      - type: project
        target: 80%
        threshold: 1%
  individual_components:
    - component_id: core
      name: "Core API"
      paths:
        - src/ndict_tools/core.py
    - component_id: tools
      name: "Tools (internals)"
      paths:
        - src/ndict_tools/tools.py
    - component_id: serialization
      name: "Serialization"
      paths:
        - src/ndict_tools/serialize.py
    - component_id: exceptions
      name: "Exceptions"
      paths:
        - src/ndict_tools/exception.py

ignore:
  - "src/ndict_tools/__init__.py"
  - "tests/**"
