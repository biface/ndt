[tox]
minversion = 4.0
envlist = py310,py311,py312,py313,py314,basedpyright,flake8,black-check,isort-check,bandit,black,isort,format,pre-push,ci-quality,ci-tests,check,coverage,local
requires = tox-uv
toxworkdir = {toxinidir}/.tox

[gh-actions]
python =
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313
    3.14: py314

[testenv]
uv_seed = true
setenv =
    PYTHONPATH = {toxinidir}/src:{toxinidir}/tests
deps =
    -r {toxinidir}/.tox-config/requirements/base.txt
commands =
    pytest --import-mode=importlib --cov=ndict_tools --cov-report=term-missing

# Environnements spécifiques par version Python
[testenv:py310]
basepython = python3.10

[testenv:py311]
basepython = python3.11

[testenv:py312]
basepython = python3.12

[testenv:py313]
basepython = python3.13

[testenv:py314]
basepython = python3.14

# ============================================================================
# OUTILS DE VÉRIFICATION INDIVIDUELS
# ============================================================================

[testenv:basedpyright]
description = Type checking with basedpyright
deps =
    -r {toxinidir}/.tox-config/requirements/type-check.txt
allowlist_externals = bash
commands =
    bash -c "basedpyright src; code=$?; [ $code -le 1 ]"

[testenv:flake8]
description = Lint the code with flake8
deps =
    -r {toxinidir}/.tox-config/requirements/linter.txt
commands =
    flake8 src tests

[testenv:black-check]
description = Check code formatting with black (no changes)
deps =
    -r {toxinidir}/.tox-config/requirements/format.txt
commands =
    black --check --diff --target-version py310 src tests

[testenv:isort-check]
description = Check import sorting with isort (no changes)
deps =
    -r {toxinidir}/.tox-config/requirements/format.txt
commands =
    isort --check-only --diff src tests

[testenv:bandit]
description = Run security analysis with bandit
deps =
    -r {toxinidir}/.tox-config/requirements/security.txt
commands =
    bandit -r src

# ============================================================================
# OUTILS DE CORRECTION AUTOMATIQUE
# ============================================================================

[testenv:black]
description = Auto-format code with black
deps =
    -r {toxinidir}/.tox-config/requirements/format.txt
commands =
    black --target-version py310 src tests

[testenv:isort]
description = Auto-sort imports with isort
deps =
    -r {toxinidir}/.tox-config/requirements/format.txt
commands =
    isort src tests

[testenv:format]
description = Auto-format code (black + isort)
deps =
    -r {toxinidir}/.tox-config/requirements/format.txt
commands =
    black --target-version py310 src tests
    isort src tests

[testenv:coverage]
description = Produce python test coverage using pytest
basepython = python3.12
deps =
    -r {toxinidir}/.tox-config/requirements/base.txt
commands =
    pytest --import-mode=importlib \
    --cov=ndict_tools \
    --cov-append \
    --cov-report=term-missing \
    --cov-report=xml:{toxinidir}/coverage/coverage.xml \
    --cov-report=html:{toxinidir}/coverage/coverage_html tests

# ============================================================================
# WORKFLOW LOCAL (AVANT PUSH)
# ============================================================================

[testenv:pre-push]
description = Complete local workflow before push (format + checks + tests)
deps =
    -r {toxinidir}/.tox-config/requirements/full.txt
allowlist_externals =
    bash
passenv =
    HOME
    USER
commands =
    # 1. Auto-formatting
    black --target-version py310 src tests
    isort src tests

    # 2. Type checking
    bash -c "basedpyright src; code=$?; [ $code -le 1 ]"

    # 3. Linting
    flake8 src tests

    # 4. Security
    bandit -r src

    # 5. Tests séquentiels multi-environnements
    bash {toxinidir}/.tox-config/scripts/test.sh

    # 6. Coverage final
    bash {toxinidir}/.tox-config/scripts/coverage.sh

# ============================================================================
# WORKFLOW CI/CD (GITHUB ACTIONS)
# ============================================================================

[testenv:ci-quality]
description = CI quality checks (no auto-fix, only verify)
deps =
    -r {toxinidir}/.tox-config/requirements/full.txt
allowlist_externals = bash
commands =
    bash -c "basedpyright src; code=$?; [ $code -le 1 ]"
    flake8 src tests
    black --check --diff --target-version py310 src tests
    isort --check-only --diff src tests
    bandit -r src

[testenv:ci-tests]
description = CI tests with coverage (used by gh-actions matrix)
deps =
    -r {toxinidir}/.tox-config/requirements/base.txt
commands =
    pytest --import-mode=importlib \
    --cov=ndict_tools \
    --cov-append \
    --cov-report=term-missing tests

# ============================================================================
# ALIASES PRATIQUES
# ============================================================================

[testenv:check]
description = Quick check (no formatting, only verify)
deps =
    -r {toxinidir}/.tox-config/requirements/full.txt
allowlist_externals = bash
commands =
    bash -c "basedpyright src; code=$?; [ $code -le 1 ]"
    flake8 src tests
    black --check --target-version py310 src tests
    isort --check-only src tests

[testenv:local]
description = Alias for pre-push (backward compatibility)
deps = {[testenv:pre-push]deps}
allowlist_externals = {[testenv:pre-push]allowlist_externals}
passenv = {[testenv:pre-push]passenv}
commands = {[testenv:pre-push]commands}

# ============================================================================
# CONFIGURATION DES OUTILS
# ============================================================================

[flake8]
max-line-length = 88
extend-ignore = E203, W503, E501
exclude =
    .tox,
    .git,
    __pycache__,
    build,
    dist,
    .eggs,
    *.egg
# Temporary — test suite cleanup deferred to v1.3.0
per-file-ignores =
    tests/*:F401,F841,E711,E712,E731,F811,F541

[isort]
profile = black
line_length = 88
known_first_party = ndict_tools
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
